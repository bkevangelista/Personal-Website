name: Main Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: be-personal-website
  REGION: us-west1
  REPOSITORY: web-images
  FRONTEND_DOCKERHUB_IMAGE: bkevangelista/personal-website-frontend
  BACKEND_DOCKERHUB_IMAGE: bkevangelista/personal-website-backend

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Backend
        working-directory: ./backend
        run: pytest tests/

      - name: Build Backend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $BACKEND_DOCKERHUB_IMAGE:${{ github.sha }} \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:${{ github.sha }} \
            ./backend \
            --load

      - name: Build Frontend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_BACKEND_API_URL=${{ secrets.NEXT_PUBLIC_BACKEND_API_URL }} \
            -t $FRONTEND_DOCKERHUB_IMAGE:${{ github.sha }} \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:${{ github.sha }} \
            ./bevangelista-website \
            --load

      - name: Push Backend Images
        run: |
          docker push $BACKEND_DOCKERHUB_IMAGE:${{ github.sha }}
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:${{ github.sha }}

      - name: Push Frontend Images
        run: |
          docker push $FRONTEND_DOCKERHUB_IMAGE:${{ github.sha }}
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:${{ github.sha }}

  deploy:
    needs: build_and_publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend
        run: |
          gcloud run deploy backend-service \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:${{ github.sha }} \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars GCP_API_KEY=${{ secrets.GCP_API_KEY }}

      - name: Deploy Frontend
        run: |
          gcloud run deploy frontend-service \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:${{ github.sha }} \
            --region $REGION \
            --allow-unauthenticated