name: pull-request.yml

on:
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  test_backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Backend
        working-directory: ./backend
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=90
  

  test_frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./bevangelista-website/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./bevangelista-website
        run: npm ci

      - name: Test Frontend
        working-directory: ./bevangelista-website
        run: npm run test:ci

  build_images:
    runs-on: ubuntu-latest
    needs: [test_backend, test_frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t backend-pr:${{ github.sha }} \
            ./backend \
            --load

      - name: Build Frontend Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_BACKEND_API_URL=${{ secrets.NEXT_PUBLIC_BACKEND_API_URL }} \
            -t frontend-pr:${{ github.sha }} \
            ./bevangelista-website \
            --load
